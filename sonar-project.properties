sonar.projectKey=booth-organizer-system
sonar.organization=booth-organizer-system
sonar.projectName=Booth Organizer System
sonar.projectVersion=1.0

# Active backend: Supabase Edge Functions (TypeScript)
# Sources only — no separate test directory; Deno test coverage is imported via LCOV.
sonar.sources=supabase/functions
sonar.sourceEncoding=UTF-8

# Deno built-in LCOV (generated by `npx deno coverage coverage --lcov`)
sonar.javascript.lcov.reportPaths=supabase/functions/coverage/lcov.info

# Skip node_modules, build output, CSS, coverage output, and test files from analysis.
sonar.exclusions=**/node_modules/**,**/build/**,**/*.css,**/coverage/**,**/*_test.ts

# Coverage exclusions — files that are in the source tree but have no Deno unit-test LCOV.
# The main Edge Function handler (Deno.serve + router, ~1000 lines in api/index.ts) requires a
# live Supabase project; covered by deployed smoke tests instead.
# supabaseClient.ts is a thin env-wrapper initialized from environment at import time.
# Test files are not part of the LCOV report.
sonar.coverage.exclusions=**/api/index.ts,**/_shared/supabaseClient.ts,**/*_test.ts
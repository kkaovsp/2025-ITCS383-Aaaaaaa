sonar.projectKey=booth-organizer-system
sonar.organization=booth-organizer-system
sonar.projectName=Booth Organizer System
sonar.projectVersion=2.0

# Active backend: Supabase Edge Functions (TypeScript) and Android app helpers.
sonar.sources=supabase/functions,implementations/mobile/app/src/main/java
sonar.sourceEncoding=UTF-8

# Deno built-in LCOV (generated by `npx deno coverage coverage --lcov`)
sonar.javascript.lcov.reportPaths=supabase/functions/coverage/lcov.info

# Android JVM unit tests for coverage import.
sonar.tests=implementations/mobile/app/src/test/java

# Skip dependencies, build output, generated coverage output, CSS, and Deno test files from source analysis.
sonar.exclusions=**/node_modules/**,**/build/**,**/*.css,**/coverage/**,**/*_test.ts

# JaCoCo XML report from Android unit tests (jacocoTestReport)
sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=implementations/mobile/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml

# Exclude UI, network, generated files, build output, and test helpers from coverage.
sonar.coverage.exclusions=\
  **/api/index.ts,\
  **/_shared/supabaseClient.ts,\
  **/MainActivity.kt,\
  **/MainActivity*.kt,\
  **/ApiClient.kt,\
  **/ApiClient*.kt,\
  **/R.class,\
  **/R$*.class,\
  **/BuildConfig.*,\
  **/Manifest*.*,\
  **/R.layout.*,\
  **/R.drawable.*,\
  **/R.string.*,\
  **/R.anim.*,\
  **/R.color.*,\
  **/R.style.*,\
  **/R.id.*,\
  **/R.xml.*,\
  **/R.*,\
  **/Lambda$*.class,\
  **/di/**,\
  **/hilt_aggregates/**,\
  implementations/backend/**,\
  implementations/frontend/node_modules/**,\
  implementations/frontend/coverage/**,\
  supabase/functions/coverage/**,\
  **/build/**,\
  **/*_test.ts,\
  **/*Test.kt,\
  **/test/**/*.kt

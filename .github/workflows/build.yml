name: Build

on:
  workflow_dispatch:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  backend:
    name: Inherited Backend (Legacy Reference)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: implementations/backend
    env:
      DATABASE_URL: sqlite:///./test.db
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Initialize backend database
        run: python -c "from app.database.db_connection import init_db; init_db()"

      - name: Run backend tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload backend coverage
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: implementations/backend/coverage.xml
          if-no-files-found: warn

  edge-coverage:
    name: Edge Function Deno Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supabase/functions
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Deno
        run: npm install --save-dev deno@1.46.0

      - name: Validate Edge Function TypeScript
        run: npx deno check api/index.ts

      - name: Run Deno tests with coverage
        run: npx deno test --coverage=coverage --no-check --allow-all api/index_test.ts _shared/shared_helpers_test.ts _shared/auth_test.ts

      - name: Convert coverage to LCOV
        run: npx deno coverage coverage --lcov > coverage/lcov.info

      - name: Upload Edge coverage LCOV
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: edge-coverage-lcov
          path: supabase/functions/coverage/lcov.info
          if-no-files-found: error

  frontend:
    name: Frontend Tests and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend tests
        run: npx react-scripts test --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Build frontend
        run: npm run build

  edge-smoke:
    name: Supabase Edge API Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run deployed Edge API smoke tests
        run: node scripts/smoke-test-edge-api.mjs

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [edge-coverage, frontend, edge-smoke]
    if: success() && !cancelled()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Edge coverage LCOV
        uses: actions/download-artifact@v4
        with:
          name: edge-coverage-lcov
          path: supabase/functions/coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
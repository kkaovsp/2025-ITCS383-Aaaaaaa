name: Build

on:
  workflow_dispatch:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/backend
    env:
      DATABASE_URL: sqlite:///./test.db
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Initialize backend database
        run: python -c "from app.database.db_connection import init_db; init_db()"

      - name: Run backend tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload backend coverage
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: implementations/backend/coverage.xml
          if-no-files-found: warn

  frontend:
    name: Frontend Tests and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend tests
        run: npx react-scripts test --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Build frontend
        run: npm run build

  edge-smoke:
    name: Supabase Edge API Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run deployed Edge API smoke tests
        run: node scripts/smoke-test-edge-api.mjs

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [backend, frontend, edge-smoke]
    if: success() && !cancelled()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: backend-coverage-xml
          path: implementations/backend

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
